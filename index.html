<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSI Signal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone" aria-label="RSI Signal app">
        <section class="splash-intro" aria-hidden="true">
          <div class="splash-reveal">
            <img class="splash-art" src="./assets/rsi-agent-splash.png" alt="" />
          </div>
        </section>

        <section class="top-bar">
          <button class="icon-btn is-hidden" type="button" aria-label="뒤로"></button>
          <h1 id="screenTitle">홈</h1>
          <div class="top-actions" id="topActions"></div>
        </section>

        <section class="content" id="content" aria-live="polite"></section>

        <nav class="bottom-nav" aria-label="하단 메뉴">
          <button class="nav-item is-active" type="button" data-screen="home">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8v9.4a.8.8 0 0 1-.8.8h-5.4v-6.4H9.2V21H3.8a.8.8 0 0 1-.8-.8z"/></svg>
            </span>
            <span>홈</span>
          </button>
          <button class="nav-item" type="button" data-screen="stocks">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h16"/><path d="M8 3v18M16 3v18"/></svg>
            </span>
            <span>종목</span>
          </button>
          <button class="nav-item" type="button" data-screen="alerts">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9z"/><path d="M10 21h4"/></svg>
            </span>
            <span>알림</span>
          </button>
          <button class="nav-item" type="button" data-screen="settings">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1a2.1 2.1 0 0 1-3 3l-.1-.1a1.8 1.8 0 0 0-2-.4 1.8 1.8 0 0 0-1.1 1.7V21a2.1 2.1 0 0 1-4.2 0v-.1a1.8 1.8 0 0 0-1.2-1.7 1.8 1.8 0 0 0-2 .4l-.1.1a2.1 2.1 0 0 1-3-3l.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.7-1.1H2a2.1 2.1 0 0 1 0-4.2h.1a1.8 1.8 0 0 0 1.7-1.2 1.8 1.8 0 0 0-.4-2l-.1-.1a2.1 2.1 0 0 1 3-3l.1.1a1.8 1.8 0 0 0 2 .4h.1A1.8 1.8 0 0 0 9.5 2V2a2.1 2.1 0 0 1 4.2 0v.1a1.8 1.8 0 0 0 1.1 1.7 1.8 1.8 0 0 0 2-.4l.1-.1a2.1 2.1 0 0 1 3 3l-.1.1a1.8 1.8 0 0 0-.4 2v.1A1.8 1.8 0 0 0 21 9.5h.1a2.1 2.1 0 0 1 0 4.2H21a1.8 1.8 0 0 0-1.6 1.3z"/></svg>
            </span>
            <span>설정</span>
          </button>
        </nav>
      </section>
    </main>

    <script src="./client.js"></script>
  </body>
</html>
